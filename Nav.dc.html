<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:color-mix(in oklab, var(--bg) 80%, transparent);border-bottom:1px solid var(--border);">
  <div style="max-width:1120px;margin:0 auto;padding:15px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="index.dc.html" style="display:flex;align-items:baseline;gap:11px;color:var(--fg);">
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.02em;">Ananda Biswas</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);">// comp. eng.</span>
    </a>
    <nav style="display:flex;align-items:center;gap:2px;">
      <sc-for list="{{ links }}" as="link" hint-placeholder-count="5">
        <a href="{{ link.href }}" style="{{ link.style }}">{{ link.label }}</a>
      </sc-for>
      <button data-theme-toggle aria-label="Toggle color theme" style="margin-left:14px;display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 13px;cursor:pointer;">
        <span style="width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block;"></span>
        <span data-theme-label>Dark</span>
      </button>
    </nav>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:72},&quot;current&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;research&quot;,&quot;cv&quot;,&quot;writing&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    var cur = this.props.current || '';
    var items = [
      { label: 'Home', href: 'index.dc.html', key: 'home' },
      { label: 'About', href: 'About.dc.html', key: 'about' },
      { label: 'Research', href: 'Research.dc.html', key: 'research' },
      { label: 'CV', href: 'CV.dc.html', key: 'cv' },
      { label: 'Writing', href: 'Writing.dc.html', key: 'writing' }
    ];
    var base = "font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.03em;padding:7px 12px;border-radius:8px;transition:color .2s ease,background .2s ease;";
    var links = items.map(function (it) {
      var active = it.key === cur;
      it.style = base + (active
        ? 'color:var(--accent);background:var(--surface);'
        : 'color:var(--muted);');
      return it;
    });
    return { links: links };
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.99 0.003 255);--surface:oklch(0.972 0.004 255);--surface-2:oklch(0.948 0.006 255);
    --fg:oklch(0.24 0.012 260);--muted:oklch(0.52 0.012 260);--border:oklch(0.9 0.006 260);
    --accent:oklch(0.56 0.15 255);--accent-soft:oklch(0.56 0.15 255 / 0.12);
  }
  [data-theme="dark"]{
    --bg:oklch(0.17 0.012 260);--surface:oklch(0.205 0.014 260);--surface-2:oklch(0.25 0.016 260);
    --fg:oklch(0.94 0.006 260);--muted:oklch(0.66 0.012 260);--border:oklch(0.31 0.014 260);
    --accent:oklch(0.74 0.13 255);--accent-soft:oklch(0.74 0.13 255 / 0.15);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:'IBM Plex Sans',Helvetica,sans-serif;-webkit-font-smoothing:antialiased;transition:background .3s ease,color .3s ease;}
  a{color:var(--accent);text-decoration:none;}
  a:hover{opacity:.72;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  @media (max-width:768px){
    main[style]{padding-left:20px !important;padding-right:20px !important;}
    header [style*="justify-content:space-between"]{flex-wrap:wrap !important;gap:10px !important;padding-top:12px !important;padding-bottom:12px !important;}
    header nav{flex-wrap:wrap !important;gap:4px !important;}
    [style*="1.35fr 0.9fr"]{grid-template-columns:1fr !important;gap:36px !important;}
    [style*="1fr 340px"]{grid-template-columns:1fr !important;gap:32px !important;}
    [style*="1fr auto"]{grid-template-columns:1fr !important;gap:20px !important;}
    [style*="170px 1fr"]{grid-template-columns:1fr !important;gap:6px !important;}
    [style*="140px 1fr"]{grid-template-columns:1fr !important;gap:6px !important;}
    [style*="52px 1fr"]{grid-template-columns:auto 1fr !important;gap:14px !important;}
    [style*="150px 1fr auto"]{grid-template-columns:1fr !important;gap:6px !important;}
    h1[style]{font-size:clamp(32px,9vw,52px) !important;}
  }
</style>
<script>
  (function(){var t;try{t=localStorage.getItem('theme');}catch(e){}document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');})();
  document.addEventListener('click',function(e){var b=e.target.closest('[data-theme-toggle]');if(!b)return;var cur=document.documentElement.getAttribute('data-theme');var next=cur==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);try{localStorage.setItem('theme',next);}catch(e){}document.querySelectorAll('[data-theme-label]').forEach(function(el){el.textContent=next==='dark'?'Light':'Dark';});});
</script>
</helmet>
<dc-import name="Nav" current="cv" hint-size="100%,72px"></dc-import>

<main style="max-width:1120px;margin:0 auto;padding:0 32px;">

  <section style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:24px;padding:80px 0 40px;animation:fadeUp .6s ease both;">
    <div>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);">Curriculum Vitae</span>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(34px,5vw,52px);line-height:1.05;letter-spacing:-0.03em;margin:18px 0 0;">Ananda Biswas</h1>
      <p style="margin:14px 0 0;font-size:16px;color:var(--muted);">Computer Engineer &middot; PhD Candidate, Iowa State University</p>
    </div>
    <a href="#" style="font-family:'IBM Plex Mono',monospace;font-size:13px;background:var(--accent);color:var(--bg);padding:13px 22px;border-radius:10px;font-weight:500;">Download PDF &#8595;</a>
  </section>

  <section style="padding:16px 0 0;">
    <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:24px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);">01</span>
      <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;letter-spacing:-0.02em;margin:0;">Experience</h2>
    </div>
    <div style="display:flex;flex-direction:column;">
      <sc-for list="{{ experience }}" as="job" hint-placeholder-count="4">
        <div style="display:grid;grid-template-columns:170px 1fr;gap:32px;padding:26px 0;border-top:1px solid var(--border);">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);">{{ job.years }}</span>
          <div>
            <h3 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin:0;letter-spacing:-0.01em;">{{ job.role }}</h3>
            <div style="font-size:14px;color:var(--accent);margin-top:5px;font-family:'IBM Plex Mono',monospace;">{{ job.org }}</div>
            <p style="margin:12px 0 0;font-size:14.5px;line-height:1.65;color:var(--muted);text-wrap:pretty;">{{ job.desc }}</p>
          </div>
        </div>
      </sc-for>
    </div>
  </section>

  <section style="padding:56px 0 0;">
    <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:24px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);">02</span>
      <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;letter-spacing:-0.02em;margin:0;">Education</h2>
    </div>
    <div style="display:flex;flex-direction:column;">
      <sc-for list="{{ education }}" as="ed" hint-placeholder-count="3">
        <div style="display:grid;grid-template-columns:170px 1fr;gap:32px;padding:22px 0;border-top:1px solid var(--border);">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);">{{ ed.years }}</span>
          <div>
            <h3 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin:0;letter-spacing:-0.01em;">{{ ed.degree }}</h3>
            <div style="font-size:14px;color:var(--muted);margin-top:5px;">{{ ed.school }}</div>
          </div>
        </div>
      </sc-for>
    </div>
  </section>

  <section style="padding:56px 0 0;">
    <div style="display:flex;align-items:baseline;gap:16px;margin-bottom:24px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);">03</span>
      <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;letter-spacing:-0.02em;margin:0;">Sponsors &amp; collaborations</h2>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;">
      <sc-for list="{{ sponsors }}" as="s" hint-placeholder-count="4">
        <span style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--fg);background:var(--surface);border:1px solid var(--border);padding:9px 16px;border-radius:8px;">{{ s }}</span>
      </sc-for>
    </div>
  </section>

</main>
<dc-import name="Footer" hint-size="100%,220px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  renderVals() {
    return {
      experience: [
        { years: '2020 \u2014 Present', role: 'Graduate Research Assistant', org: 'Iowa State University', desc: 'Lead pre-RTL evaluation of hardware microarchitectures for early PPA estimation and architecture exploration. Execute sponsored research across chiplet SoC design, distributed AI, and embedded cybersecurity for federal and industry partners.' },
        { years: 'Prior', role: 'Add previous role / title', org: 'Organization name', desc: 'Editable placeholder \u2014 summarize responsibilities and impact. Include earlier industry or research positions that make up your 9+ years of experience.' },
        { years: 'Prior', role: 'Add previous role / title', org: 'Organization name', desc: 'Editable placeholder for an earlier position in computer architecture, verification, or system modeling.' }
      ],
      education: [
        { years: '2020 \u2014 Present', degree: 'Ph.D., Computer Engineering', school: 'Iowa State University \u00b7 Ames, IA' },
        { years: 'Year', degree: 'M.S., Computer Engineering', school: 'Add institution' },
        { years: 'Year', degree: 'B.S., Electrical / Computer Engineering', school: 'Add institution' }
      ],
      sponsors: ['Boeing', 'Collins Aerospace', 'DARPA', 'NSF']
    };
  }
}
</script>
</body>
</html>

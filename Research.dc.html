<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.99 0.003 255);--surface:oklch(0.972 0.004 255);--surface-2:oklch(0.948 0.006 255);
    --fg:oklch(0.24 0.012 260);--muted:oklch(0.52 0.012 260);--border:oklch(0.9 0.006 260);
    --accent:oklch(0.56 0.15 255);--accent-soft:oklch(0.56 0.15 255 / 0.12);
  }
  [data-theme="dark"]{
    --bg:oklch(0.17 0.012 260);--surface:oklch(0.205 0.014 260);--surface-2:oklch(0.25 0.016 260);
    --fg:oklch(0.94 0.006 260);--muted:oklch(0.66 0.012 260);--border:oklch(0.31 0.014 260);
    --accent:oklch(0.74 0.13 255);--accent-soft:oklch(0.74 0.13 255 / 0.15);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--fg);font-family:'IBM Plex Sans',Helvetica,sans-serif;-webkit-font-smoothing:antialiased;transition:background .3s ease,color .3s ease;}
  a{color:var(--accent);text-decoration:none;}
  a:hover{opacity:.72;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  @media (max-width:768px){
    main[style]{padding-left:20px !important;padding-right:20px !important;}
    header [style*="justify-content:space-between"]{flex-wrap:wrap !important;gap:10px !important;padding-top:12px !important;padding-bottom:12px !important;}
    header nav{flex-wrap:wrap !important;gap:4px !important;}
    [style*="1.35fr 0.9fr"]{grid-template-columns:1fr !important;gap:36px !important;}
    [style*="1fr 340px"]{grid-template-columns:1fr !important;gap:32px !important;}
    [style*="1fr auto"]{grid-template-columns:1fr !important;gap:20px !important;}
    [style*="170px 1fr"]{grid-template-columns:1fr !important;gap:6px !important;}
    [style*="140px 1fr"]{grid-template-columns:1fr !important;gap:6px !important;}
    [style*="52px 1fr"]{grid-template-columns:auto 1fr !important;gap:14px !important;}
    [style*="150px 1fr auto"]{grid-template-columns:1fr !important;gap:6px !important;}
    h1[style]{font-size:clamp(32px,9vw,52px) !important;}
  }
</style>
<script>
  (function(){var t;try{t=localStorage.getItem('theme');}catch(e){}document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');})();
  document.addEventListener('click',function(e){var b=e.target.closest('[data-theme-toggle]');if(!b)return;var cur=document.documentElement.getAttribute('data-theme');var next=cur==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);try{localStorage.setItem('theme',next);}catch(e){}document.querySelectorAll('[data-theme-label]').forEach(function(el){el.textContent=next==='dark'?'Light':'Dark';});});
</script>
</helmet>
<dc-import name="Nav" current="research" hint-size="100%,72px"></dc-import>

<main style="max-width:1120px;margin:0 auto;padding:0 32px;">

  <section style="padding:80px 0 8px;animation:fadeUp .6s ease both;">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);">Research &amp; projects</span>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(34px,5vw,52px);line-height:1.05;letter-spacing:-0.03em;margin:18px 0 0;max-width:760px;">Sponsored programs in architecture, simulation, and secure compute.</h1>
    <p style="max-width:640px;margin:22px 0 0;font-size:16.5px;line-height:1.65;color:var(--muted);text-wrap:pretty;">Sponsored programs in architecture, simulation, and secure compute.</p>
  </section>

  <section style="padding:24px 0 120px;">
    <div style="border:1px solid var(--border);border-radius:16px;padding:64px 40px;text-align:center;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);">Coming soon</span>
      <p style="margin:14px auto 0;max-width:420px;font-size:15px;line-height:1.65;color:var(--muted);">Project and publication details are being prepared and will be added here shortly.</p>
    </div>
  </section>

</main>
<dc-import name="Footer" hint-size="100%,220px"></dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  renderVals() {
    return {
      projects: [
        { sponsor: 'DARPA', years: 'Sponsored', title: 'Chiplet-based SoC architecture & exploration', desc: 'Pre-RTL modeling and design-space exploration of disaggregated, chiplet-based systems-on-chip \u2014 evaluating interconnect topologies and partitioning for early PPA estimation. Replace with your public-facing summary.', tags: ['Chiplet SoC', 'PPA', 'Interconnect'] },
        { sponsor: 'Boeing', years: 'Sponsored', title: 'Multi-fidelity system simulation for early estimation', desc: 'Developed multi-fidelity simulation flows to estimate power, performance, and area across abstraction levels early in the design cycle, supporting architecture-level decisions.', tags: ['Simulation', 'Architecture exploration'] },
        { sponsor: 'Collins Aerospace', years: 'Sponsored', title: 'Distributed AI on embedded architectures', desc: 'Hardware\u2013software co-design for distributed AI workloads on resource-constrained embedded platforms. Add scope, results, or collaborators as appropriate.', tags: ['Distributed AI', 'HW/SW co-design'] },
        { sponsor: 'NSF', years: 'Sponsored', title: 'Embedded cybersecurity & secure microarchitecture', desc: 'Investigated secure microarchitectural techniques and embedded cybersecurity for trustworthy compute systems. Editable placeholder.', tags: ['Security', 'Microarchitecture'] }
      ],
      pubs: [
        { ref: '[1]', title: 'Add your publication title here', authors: 'A. Biswas, Co-author, Co-author', venue: 'Conference / Journal name, Year' },
        { ref: '[2]', title: 'Add your publication title here', authors: 'A. Biswas, Co-author', venue: 'Conference / Journal name, Year' },
        { ref: '[3]', title: 'Add your publication title here', authors: 'Co-author, A. Biswas', venue: 'Conference / Journal name, Year' },
        { ref: '[4]', title: 'Add your publication title here', authors: 'A. Biswas et al.', venue: 'Workshop / Symposium, Year' }
      ]
    };
  }
}
</script>
</body>
</html>
